# PARE: Paralog And allelic Regulatory Element pipeline
# Configuration file

# REQUIRED: Path to the augmented union peaks BED (bgzipped TSV).
# Produced upstream by add_slop_to_union_bed.py (see docs/add_slop_to_union_bed.spec.md).
# The file must include these columns in addition to the standard union format:
#   asm_slop_start, asm_slop_end, slop_seq
union_bed: "chr19-union-peaks-cons.slop2kb.bed.gz"

# REQUIRED: small sidecar TSV (uncompressed or .gz) with one row per unique
# sample_id. Columns: sample_id  Individual_ID  Haplotype  is_primary_sample.
# See workflow/rules/common.smk for a one-liner to generate it from union_bed.
samples_tsv: "config/samples.tsv"

# OPTIONAL: TSV mapping sample_id -> ft_bam path (enables the pileup rules).
# Columns: sample_id, ft_bam
# Leave unset to skip pileup.
# ft_bam_table: "config/ft_bams.tsv"

output_dir: "results"
temp_dir: "temp"

# All of the blocks below are optional; defaults live in workflow/rules/common.smk.

# alignment:
#   min_identity: 80        # Minimum % blast identity
#   min_coverage: 80        # Minimum % peak coverage (both query and target)
#   threads: 8
#   kmer_size: 15
#   window_size: 10

